name: mma-manager
region: nyc
services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xs
    http_port: 3000
    health_check:
      http_path: /api/health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PLATFORM_ADMIN_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: PLATFORM_ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: SPACES_ENDPOINT
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_REGION
        value: nyc3
      - key: SPACES_BUCKET
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_CDN_URL
        scope: RUN_TIME
        type: SECRET
    mounts:
      - path: /app/uploads
        volume:
          name: uploads-data
    routes:
      - path: /
volumes:
  - name: uploads-data
    region: nyc
    size: 5Gi
databases:
  - name: mma-db
    engine: PG
    version: "16"
    production: true
