name: mma-manager
region: nyc
services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xs
    http_port: 3000
    health_check:
      http_path: /api/health
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PLATFORM_ADMIN_EMAIL
        scope: RUN_TIME
        type: SECRET
      - key: PLATFORM_ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /app/uploads
    routes:
      - path: /
databases:
  - name: mma-db
    engine: PG
    version: "16"
    production: true
